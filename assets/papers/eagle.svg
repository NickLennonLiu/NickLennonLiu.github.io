<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 240" role="img" aria-label="Eagle framework concept diagram">
  <defs>
    <linearGradient id="eg-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eaf2ff"/>
    </linearGradient>
    <linearGradient id="eg-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f6ff"/>
    </linearGradient>
    <linearGradient id="eg-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <marker id="eg-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1e40af"/>
    </marker>
  </defs>

  <rect width="1000" height="240" rx="14" fill="url(#eg-bg)"/>
  <rect x="0.5" y="0.5" width="999" height="239" rx="14" fill="none" stroke="#bfdbfe"/>

  <!-- Stage 1: Operations Documents -->
  <g transform="translate(40,40)">
    <rect width="180" height="160" rx="12" fill="url(#eg-card)" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="90" y="26" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e40af" letter-spacing="0.5">&#9312; OPS DOCUMENTS</text>
    <g transform="translate(40,46)" stroke="#1e40af" stroke-width="1.8" fill="#dbeafe">
      <rect x="0" y="0" width="50" height="64" rx="3"/>
      <rect x="14" y="-8" width="50" height="64" rx="3" fill="#eff6ff"/>
      <rect x="28" y="-16" width="50" height="64" rx="3" fill="#ffffff"/>
      <line x1="36" y1="-4" x2="68" y2="-4" stroke-width="1"/>
      <line x1="36" y1="4" x2="68" y2="4" stroke-width="1"/>
      <line x1="36" y1="12" x2="68" y2="12" stroke-width="1"/>
      <line x1="36" y1="20" x2="62" y2="20" stroke-width="1"/>
    </g>
    <text x="90" y="138" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#374151">Logs &#183; Metrics &#183; Traces</text>
    <text x="90" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#374151">Configs &#183; Manuals</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="226" y1="120" x2="266" y2="120" stroke="#1e40af" stroke-width="2.2" marker-end="url(#eg-arrow)"/>

  <!-- Stage 2: Ops-centric Taxonomy -->
  <g transform="translate(272,40)">
    <rect width="180" height="160" rx="12" fill="url(#eg-card)" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="90" y="26" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e40af" letter-spacing="0.5">&#9313; OPS TAXONOMY</text>
    <g transform="translate(34,46)" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e3a8a">
      <circle cx="56" cy="6" r="6" fill="#1e40af"/>
      <line x1="56" y1="12" x2="20" y2="40" stroke="#94a3b8" stroke-width="1.2"/>
      <line x1="56" y1="12" x2="56" y2="40" stroke="#94a3b8" stroke-width="1.2"/>
      <line x1="56" y1="12" x2="92" y2="40" stroke="#94a3b8" stroke-width="1.2"/>
      <rect x="-2" y="40" width="44" height="20" rx="4" fill="#dbeafe" stroke="#1e40af" stroke-width="1"/>
      <rect x="34" y="40" width="44" height="20" rx="4" fill="#dbeafe" stroke="#1e40af" stroke-width="1"/>
      <rect x="70" y="40" width="44" height="20" rx="4" fill="#dbeafe" stroke="#1e40af" stroke-width="1"/>
      <text x="20" y="54" text-anchor="middle">Anomaly</text>
      <text x="56" y="54" text-anchor="middle">Diagnosis</text>
      <text x="92" y="54" text-anchor="middle">RCA</text>
      <line x1="20" y1="60" x2="20" y2="76" stroke="#94a3b8" stroke-width="1.2"/>
      <line x1="56" y1="60" x2="56" y2="76" stroke="#94a3b8" stroke-width="1.2"/>
      <line x1="92" y1="60" x2="92" y2="76" stroke="#94a3b8" stroke-width="1.2"/>
      <rect x="0" y="76" width="40" height="16" rx="3" fill="#eff6ff" stroke="#93c5fd"/>
      <rect x="36" y="76" width="40" height="16" rx="3" fill="#eff6ff" stroke="#93c5fd"/>
      <rect x="72" y="76" width="40" height="16" rx="3" fill="#eff6ff" stroke="#93c5fd"/>
      <text x="20" y="87" text-anchor="middle" font-size="9">Reason</text>
      <text x="56" y="87" text-anchor="middle" font-size="9">Recall</text>
      <text x="92" y="87" text-anchor="middle" font-size="9">Apply</text>
    </g>
  </g>

  <line x1="458" y1="120" x2="498" y2="120" stroke="#1e40af" stroke-width="2.2" marker-end="url(#eg-arrow)"/>

  <!-- Stage 3: Auto Question Generation -->
  <g transform="translate(504,40)">
    <rect width="180" height="160" rx="12" fill="url(#eg-card)" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="90" y="26" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e40af" letter-spacing="0.5">&#9314; QA GENERATION</text>
    <g transform="translate(20,46)">
      <rect x="0" y="0" width="148" height="22" rx="5" fill="#dbeafe" stroke="#1e40af" stroke-width="1"/>
      <text x="74" y="15" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">Knowledge Extraction</text>
      <line x1="74" y1="22" x2="74" y2="30" stroke="#1e40af" stroke-width="1.4" marker-end="url(#eg-arrow)"/>
      <rect x="0" y="32" width="148" height="22" rx="5" fill="#dbeafe" stroke="#1e40af" stroke-width="1"/>
      <text x="74" y="47" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">LLM Question Synthesis</text>
      <line x1="74" y1="54" x2="74" y2="62" stroke="#1e40af" stroke-width="1.4" marker-end="url(#eg-arrow)"/>
      <rect x="0" y="64" width="148" height="22" rx="5" fill="#dbeafe" stroke="#1e40af" stroke-width="1"/>
      <text x="74" y="79" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">Multi-granular Quality</text>
      <text x="74" y="106" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#374151">4,845 domain-grounded QAs</text>
    </g>
  </g>

  <line x1="690" y1="120" x2="730" y2="120" stroke="#1e40af" stroke-width="2.2" marker-end="url(#eg-arrow)"/>

  <!-- Stage 4: Standardized Evaluation -->
  <g transform="translate(736,40)">
    <rect width="222" height="160" rx="12" fill="url(#eg-card)" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="111" y="26" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e40af" letter-spacing="0.5">&#9315; OPS-LLM EVALUATION</text>
    <g transform="translate(18,42)">
      <rect x="0" y="0" width="84" height="46" rx="6" fill="#eff6ff" stroke="#1e40af" stroke-width="1"/>
      <text x="42" y="18" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">Anomaly</text>
      <text x="42" y="33" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">Detection</text>
      <rect x="100" y="0" width="84" height="46" rx="6" fill="#eff6ff" stroke="#1e40af" stroke-width="1"/>
      <text x="142" y="18" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">Fault</text>
      <text x="142" y="33" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">Diagnosis</text>
      <rect x="0" y="54" width="184" height="40" rx="6" fill="url(#eg-accent)"/>
      <text x="92" y="71" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Root-Cause Analysis</text>
      <text x="92" y="86" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#dbeafe">+22%&#8211;49% vs SOTA baselines</text>
    </g>
  </g>

  <text x="500" y="226" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-style="italic" fill="#1e40af" font-weight="600">Figure: Overview of the Eagle benchmarking pipeline (concept illustration)</text>
</svg>
