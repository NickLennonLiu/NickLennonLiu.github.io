<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Three.js orbit demo cover</title>
  <desc id="desc">A sphere, tetrahedron, and cube orbiting on a dark canvas.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0" stop-color="#35506a"/>
      <stop offset="0.48" stop-color="#121b27"/>
      <stop offset="1" stop-color="#06090d"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <linearGradient id="cube" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#9af09e"/>
      <stop offset="1" stop-color="#39b46b"/>
    </linearGradient>
    <linearGradient id="tetra" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe59a"/>
      <stop offset="1" stop-color="#f0a92f"/>
    </linearGradient>
    <linearGradient id="sphere" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8fe5ff"/>
      <stop offset="1" stop-color="#2599df"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <ellipse cx="640" cy="372" rx="390" ry="130" fill="none" stroke="#9ab7cc" stroke-width="4" stroke-opacity="0.45"/>
  <path d="M396 416 C560 250 770 510 884 302" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.22"/>
  <circle cx="396" cy="416" r="86" fill="#45c8ff" fill-opacity="0.16" filter="url(#soft)"/>
  <circle cx="396" cy="416" r="64" fill="url(#sphere)"/>
  <circle cx="374" cy="392" r="18" fill="#ffffff" fill-opacity="0.36"/>
  <polygon points="884,250 956,398 808,386" fill="url(#tetra)"/>
  <path d="M884 250 L884 390" stroke="#704d18" stroke-width="4" stroke-opacity="0.28"/>
  <path d="M884 250 L956 398" stroke="#ffffff" stroke-width="4" stroke-opacity="0.24"/>
  <g transform="translate(610 318) rotate(-10)">
    <polygon points="0,50 80,0 160,50 80,100" fill="#b8f7b9"/>
    <polygon points="0,50 80,100 80,190 0,140" fill="#62cf7b"/>
    <polygon points="80,100 160,50 160,140 80,190" fill="url(#cube)"/>
    <path d="M0 50 L80 100 L160 50 M80 100 L80 190" fill="none" stroke="#0f4b2a" stroke-width="4" stroke-opacity="0.28"/>
  </g>
  <text x="72" y="112" fill="#e8edf2" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="58" font-weight="800">3D Orbit Demo</text>
  <text x="74" y="162" fill="#b8c7d3" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24">Three.js scene with orbiting geometry</text>
</svg>
